version: 2

builds:
  - id: rpictl
    main: ./cmd/rpictl
    binary: rpictl
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - "-s -w -X github.com/idvoretskyi/rpictl/internal/version.Version={{.Version}}"

  - id: rpictl-agent
    main: ./cmd/rpictl-agent
    binary: rpictl-agent
    goos: [linux]
    goarch: [arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - "-s -w -X github.com/idvoretskyi/rpictl/internal/version.Version={{.Version}}"

archives:
  - id: rpictl
    ids: [rpictl]
    name_template: "rpictl_{{.Os}}_{{.Arch}}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

  - id: rpictl-agent
    ids: [rpictl-agent]
    name_template: "rpictl-agent_{{.Os}}_{{.Arch}}"
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

sboms:
  - id: archive
    artifacts: archive
    documents:
      - "${artifact.name}.sbom.spdx.json"

release:
  github:
    owner: idvoretskyi
    name: rpictl
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"

