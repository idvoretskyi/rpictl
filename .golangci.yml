version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign

issues:
  exclude-rules:
    # InsecureIgnoreHostKey is documented; suppress gosec warning
    - linters: [gosec]
      text: "G106"
    # os/exec in agent is intentional
    - linters: [gosec]
      text: "G204"
